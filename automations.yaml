- id: '1769115569548'
  alias: VisualPi control
  description: ''
  triggers:
  - domain: mqtt
    device_id: 65d320cd566f76c212b7108fe7345911
    type: action
    subtype: 'off'
    trigger: device
    id: off_pressed
  - domain: mqtt
    device_id: 65d320cd566f76c212b7108fe7345911
    type: action
    subtype: 'on'
    trigger: device
    id: on_pressed
  - domain: mqtt
    device_id: 65d320cd566f76c212b7108fe7345911
    type: action
    subtype: brightness_move_down
    trigger: device
    id: down_held
  - domain: mqtt
    device_id: 65d320cd566f76c212b7108fe7345911
    type: action
    subtype: brightness_move_up
    trigger: device
    id: up_held
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: on_pressed
      sequence:
      - data: {}
        action: shell_command.visualpi_next
    - conditions:
      - condition: trigger
        id: off_pressed
      sequence:
      - data: {}
        action: shell_command.visualpi_prev
    - conditions:
      - condition: trigger
        id: down_held
      sequence:
      - data: {}
        action: shell_command.visualpi_dele
    - conditions:
      - condition: trigger
        id:
        - up_held
      sequence:
      - action: media_player.turn_on
        metadata: {}
        data: {}
        target:
          device_id: ea9ab3b6f8bd3f13d53904866937bc10
      - action: media_player.select_source
        metadata: {}
        data:
          source: Turtable
        target:
          entity_id: media_player.living_room_av_amp_3
          device_id: ea9ab3b6f8bd3f13d53904866937bc10
      - action: media_player.turn_on
        metadata: {}
        data: {}
        target:
          entity_id: media_player.43pus8517_12_3
      - action: media_player.select_source
        metadata: {}
        data:
          source: HDMI 2
        target:
          device_id: a80cbf08bb07c10bee409478d02663ac
      - action: switch.toggle
        metadata: {}
        data: {}
        target:
          entity_id: switch.43pus8517_12_ambilight_hue
  mode: single
