energy_fossil_home:
  name: Home Fossil Energy
  min: 0
  max: 1000000
  step: 0.001
  unit_of_measurement: kWh
  mode: box

energy_low_carbon_home:
  name: Home Low Carbon Energy
  min: 0
  max: 1000000
  step: 0.001
  unit_of_measurement: kWh
  mode: box

carbon_footprint_home:
  name: Home Carbon Footprint
  min: 0
  max: 200000000
  unit_of_measurement: kgCO2eq
  mode: box

# A positive, lifetime counter for the avoided grid carbon from electricity
# actually exported by the inverter.  It is kept separately from imported
# electricity carbon so both sides remain auditable and monotonic.
solar_export_carbon_credit_home:
  name: Home Solar Export Carbon Credit
  min: 0
  max: 200000000
  step: 0.001
  unit_of_measurement: kgCO2eq
  mode: box

cost_home:
  name: Home Cost
  min: 0
  max: 1000000
  unit_of_measurement: GBP
  mode: box
