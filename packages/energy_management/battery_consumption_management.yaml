## helpers, sensors, automations and customisations for managing domestic consumption and battery life
## Helpers
input_number:
  battery_normal_burn_rate:
    name: Battery normal burn rate
    icon: mdi:home-lightning-bolt-outline
    min: 0.1
    max: 3
    step: 0.1
    mode: box
    unit_of_measurement: kW
    initial: 0.6

  battery_safety_buffer:
    name: Battery safety buffer
    icon: mdi:battery-heart-variant
    min: 0
    max: 5
    step: 0.1
    mode: box
    unit_of_measurement: kWh
    initial: 1

  battery_export_hysteresis:
    name: Battery export hysteresis
    icon: mdi:swap-horizontal
    min: 0.1
    max: 2
    step: 0.1
    mode: box
    unit_of_measurement: kWh
    initial: 0.5

input_select:
  energy_automation_mode:
    name: Energy automation mode
    icon: mdi:transmission-tower
    options:
      - Observe only
      - Automatic
      - Manual

## Sensors
template:
  - binary_sensor:
    - name: "Battery non-viability"
      unique_id: binary_sensor.battery_non_viability
      icon: >-
        {% if this.attributes.non_viability | default(False) %}
          mdi:battery-alert-variant-outline
        {% else %}
          mdi:battery-check-outline
        {% endif %}
      state: >
        {{ this.attributes.non_viability | default(False) }}

      attributes:
        available_capacity: >-
          {{ this.attributes.remaining_capacity - this.attributes.min_capacity }}

        current_net_load: >-
          {{ states('sensor.house_net_load_30_minute_average') | float(default=0) }}

        surplus_capacity: >-
          {% set available_capacity = this.attributes.available_capacity %}
          {% set energy_required_for_base_load = this.attributes.energy_required_for_base_load %}
          {% set safety_buffer = this.attributes.safety_buffer %}
          {% set surplus_capacity = available_capacity - energy_required_for_base_load - safety_buffer %}
          {% set surplus_capacity = 0 if surplus_capacity < 0 else surplus_capacity %}
          {{ surplus_capacity }}

        reserve_capacity: >-
          {{ this.attributes.min_capacity + this.attributes.energy_required_for_base_load + this.attributes.safety_buffer }}

        time_to_next_off_peak: >-
          {{ ((as_timestamp(states.binary_sensor.battery_co2_mitigation.attributes.off_peak_next_start | default('unavailable')) - as_timestamp(now())) / 3600) | float(default=0.1) }}

        energy_required_for_base_load: >-
          {{ this.attributes.time_to_next_off_peak * this.attributes.base_load }}

        energy_required_for_current_net_load: >-
          {{ this.attributes.time_to_next_off_peak * this.attributes.current_net_load }}

        time_remaining_at_current_net_load: >-
          {% set current_net_load = this.attributes.current_net_load %}
          {% set available_capacity = this.attributes.available_capacity %}
          {% set hours = (available_capacity / current_net_load) | float(1)  %}
          {% set hours = 24 if hours > 24 else hours  %}
          {% set hours = 0 if hours < 0 else hours  %}
          {{ hours }}

        time_remaining_at_base_load: >-
          {% set base_load = this.attributes.base_load %}
          {% set available_capacity = this.attributes.available_capacity %}
          {% set hours = (available_capacity / base_load) | float(1)  %}
          {% set hours = 24 if hours > 24 else hours  %}
          {% set hours = 0 if hours < 0 else hours  %}
          {{ hours }}

        time_surplus: >-
          {% set time_surplus = this.attributes.time_remaining_at_base_load - this.attributes.time_to_next_off_peak %}
          {% if time_surplus > 0 %}
          {{ time_surplus }}
          {% else %}
          0
          {% endif %}

        time_surplus_string: >-
          {% set hours = this.attributes.time_surplus | round(0,'floor') %}
          {% set minutes = ((this.attributes.time_surplus - hours) * 60) | round(0) %}
          {% if hours > 0 %}{{ hours }}h {% endif %}{{ minutes }}m

        time_deficit: >-
          {% set time_deficit = this.attributes.time_to_next_off_peak - this.attributes.time_remaining_at_base_load %}
          {% if time_deficit > 0 %}
          {{ time_deficit }}
          {% else %}
          0
          {% endif %}        

        time_deficit_string: >-
          {% set hours = this.attributes.time_deficit | round(0,'floor') %}
          {% set minutes = ((this.attributes.time_deficit - hours) * 60) | round(0) %}
          {% if hours > 0 %}{{ hours }}h {% endif %}{{ minutes }}m

        current_net_load_capacity_coverage: >-
          {{ this.attributes.available_capacity / this.attributes.energy_required_for_current_net_load }}

        base_load_capacity_coverage: >-
          {{ this.attributes.available_capacity / this.attributes.energy_required_for_base_load }}

        remaining_capacity: >-
          {{ states('sensor.bms_kwh_remaining') | float(default=0) }}

        base_load: >-
          {{ states('input_number.battery_normal_burn_rate') | float(default=0.6) }}

        safety_buffer: >-
          {{ states('input_number.battery_safety_buffer') | float(default=1) }}

        min_capacity: >-
          {% set remaining_capacity = states('sensor.bms_kwh_remaining') | float(default=0) %}
          {% set current_soc = states('sensor.battery_soc') | float(default=0) %}
          {{ (remaining_capacity * 10 / current_soc) if current_soc > 0 else 2 }}



        non_viability: >-
          {{ 0 <= this.attributes.current_net_load_capacity_coverage < 1 }}

  - sensor:
    - name: Battery solar strategy
      unique_id: sensor.battery_solar_strategy
      icon: >-
        {% if this.state == 'Feed-in First' %}
          mdi:transmission-tower-export
        {% else %}
          mdi:battery-charging
        {% endif %}
      state: >-
        {% set remaining_capacity = states('sensor.bms_kwh_remaining') | float(default=0) %}
        {% set min_capacity = state_attr('binary_sensor.battery_non_viability', 'min_capacity') | float(default=2) %}
        {% set hours_to_off_peak = state_attr('binary_sensor.battery_non_viability', 'time_to_next_off_peak') | float(default=24) %}
        {% set burn_rate = states('input_number.battery_normal_burn_rate') | float(default=0.6) %}
        {% set safety_buffer = states('input_number.battery_safety_buffer') | float(default=1) %}
        {% set hysteresis = states('input_number.battery_export_hysteresis') | float(default=0.5) %}
        {% set export_headroom = remaining_capacity - min_capacity - (hours_to_off_peak * burn_rate) - safety_buffer %}
        {% set current_mode = states('select.work_mode') %}
        {% if export_headroom < 0 %}
          Self Use
        {% elif current_mode == 'Feed-in First' or export_headroom >= hysteresis %}
          Feed-in First
        {% else %}
          Self Use
        {% endif %}
      attributes:
        remaining_capacity: >-
          {{ states('sensor.bms_kwh_remaining') | float(default=0) }}
        minimum_reserve: >-
          {{ state_attr('binary_sensor.battery_non_viability', 'min_capacity') | float(default=2) }}
        time_to_next_off_peak: >-
          {{ state_attr('binary_sensor.battery_non_viability', 'time_to_next_off_peak') | float(default=24) }}
        normal_burn_rate: >-
          {{ states('input_number.battery_normal_burn_rate') | float(default=0.6) }}
        safety_buffer: >-
          {{ states('input_number.battery_safety_buffer') | float(default=1) }}
        reserve_required: >-
          {% set minimum_reserve = state_attr('binary_sensor.battery_non_viability', 'min_capacity') | float(default=2) %}
          {% set hours_to_off_peak = state_attr('binary_sensor.battery_non_viability', 'time_to_next_off_peak') | float(default=24) %}
          {% set burn_rate = states('input_number.battery_normal_burn_rate') | float(default=0.6) %}
          {% set safety_buffer = states('input_number.battery_safety_buffer') | float(default=1) %}
          {{ minimum_reserve + (hours_to_off_peak * burn_rate) + safety_buffer }}
        export_headroom: >-
          {% set remaining_capacity = states('sensor.bms_kwh_remaining') | float(default=0) %}
          {% set minimum_reserve = state_attr('binary_sensor.battery_non_viability', 'min_capacity') | float(default=2) %}
          {% set hours_to_off_peak = state_attr('binary_sensor.battery_non_viability', 'time_to_next_off_peak') | float(default=24) %}
          {% set burn_rate = states('input_number.battery_normal_burn_rate') | float(default=0.6) %}
          {% set safety_buffer = states('input_number.battery_safety_buffer') | float(default=1) %}
          {{ remaining_capacity - minimum_reserve - (hours_to_off_peak * burn_rate) - safety_buffer }}
        reason: >-
          {% set remaining_capacity = states('sensor.bms_kwh_remaining') | float(default=0) %}
          {% set minimum_reserve = state_attr('binary_sensor.battery_non_viability', 'min_capacity') | float(default=2) %}
          {% set hours_to_off_peak = state_attr('binary_sensor.battery_non_viability', 'time_to_next_off_peak') | float(default=24) %}
          {% set burn_rate = states('input_number.battery_normal_burn_rate') | float(default=0.6) %}
          {% set safety_buffer = states('input_number.battery_safety_buffer') | float(default=1) %}
          {% set export_headroom = remaining_capacity - minimum_reserve - (hours_to_off_peak * burn_rate) - safety_buffer %}
          {% if export_headroom >= 0 %}
            Battery can reach off-peak with its minimum reserve and safety buffer intact.
          {% else %}
            Battery needs to retain solar to reach off-peak with its minimum reserve and safety buffer intact.
          {% endif %}

    - name: House Net Load
      unique_id: sensor.house_net_load
      unit_of_measurement: kW
      state: >-
        {{ states('sensor.load_power') | float(default=0) - states('sensor.solar_power_now') | float(default=0) }}


sensor:
  - platform: statistics
    name: "House Net Load 30 minute average"
    entity_id: sensor.house_net_load
    state_characteristic: mean
    max_age:
      minutes: 30

automation:
  - id: battery_solar_strategy_application
    alias: Apply battery solar strategy
    description: >-
      Uses the battery reserve calculation to choose between exporting solar and
      retaining it. Daytime Intelligent Go slots and flex events are handled separately.
    trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.battery_solar_strategy
          - input_select.energy_automation_mode
    condition:
      - condition: template
        value_template: >-
          {{ trigger.platform != 'state'
             or trigger.from_state is none
             or trigger.to_state is none
             or trigger.from_state.state != trigger.to_state.state }}
    variables:
      operating_mode: "{{ states('input_select.energy_automation_mode') }}"
      current_work_mode: "{{ states('select.work_mode') }}"
      desired_work_mode: "{{ states('sensor.battery_solar_strategy') }}"
      can_set_normal_mode: >-
        {{ current_work_mode in ['Feed-in First', 'Self Use']
           and desired_work_mode in ['Feed-in First', 'Self Use']
           and current_work_mode != desired_work_mode }}
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ operating_mode == 'Automatic' and can_set_normal_mode }}"
            sequence:
              - service: select.select_option
                target:
                  entity_id: select.work_mode
                data:
                  option: "{{ desired_work_mode }}"
              - service: system_log.write
                data:
                  level: info
                  logger: energy_solar_strategy
                  message: >-
                    Applied {{ desired_work_mode }}: {{ state_attr('sensor.battery_solar_strategy', 'reason') }}
          - conditions:
              - condition: template
                value_template: "{{ operating_mode == 'Observe only' and can_set_normal_mode }}"
            sequence:
              - service: system_log.write
                data:
                  level: info
                  logger: energy_solar_strategy
                  message: >-
                    Would apply {{ desired_work_mode }}: {{ state_attr('sensor.battery_solar_strategy', 'reason') }}
    mode: restart
