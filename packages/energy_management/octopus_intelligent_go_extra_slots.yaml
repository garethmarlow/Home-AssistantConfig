## Sometimes we get Octopus Intelligent slots outside of off-peak hours
## this package detects when they happen, and charges the house battery too
## Inspired by https://foxesscommunity.com/viewtopic.php?t=445

## Sensors
template:
  - binary_sensor:
    - name: Octopus Intelligent Go peak-time slot
      unique_id: binary_sensor.octopus_intelligent_go_peak_time_slot
      state: >-
        {% set dispatch_entity = 'binary_sensor.octopus_energy_00000000_0002_4000_8020_00000005cc63_intelligent_dispatching' %}
        {% set current_time = now().strftime('%H:%M:%S') %}
        {% set configured_start = states('input_datetime.off_peak_start_time') %}
        {% set configured_end = states('input_datetime.off_peak_end_time') %}
        {% set off_peak_start = configured_start if configured_start not in ['unknown', 'unavailable'] else '23:30:00' %}
        {% set off_peak_end = configured_end if configured_end not in ['unknown', 'unavailable'] else '05:30:00' %}
        {% set normal_off_peak_active = current_time >= off_peak_start or current_time < off_peak_end %}
        {% set raw_slot_start = state_attr(dispatch_entity, 'current_start') %}
        {% set raw_slot_end = state_attr(dispatch_entity, 'current_end') %}
        {% set slot_start = raw_slot_start | as_datetime | as_local if raw_slot_start else none %}
        {% set slot_end = raw_slot_end | as_datetime | as_local if raw_slot_end else none %}
        {{ not normal_off_peak_active
           and is_state(dispatch_entity, 'on')
           and slot_start is not none
           and slot_end is not none
           and now() >= slot_start
           and now() < slot_end }}
      attributes:
        start_time: >-
          {% set dispatch_entity = 'binary_sensor.octopus_energy_00000000_0002_4000_8020_00000005cc63_intelligent_dispatching' %}
          {% set current_time = now().strftime('%H:%M:%S') %}
          {% set configured_start = states('input_datetime.off_peak_start_time') %}
          {% set configured_end = states('input_datetime.off_peak_end_time') %}
          {% set off_peak_start = configured_start if configured_start not in ['unknown', 'unavailable'] else '23:30:00' %}
          {% set off_peak_end = configured_end if configured_end not in ['unknown', 'unavailable'] else '05:30:00' %}
          {% set normal_off_peak_active = current_time >= off_peak_start or current_time < off_peak_end %}
          {% set raw_slot_start = state_attr(dispatch_entity, 'current_start') %}
          {% set slot_start = raw_slot_start | as_datetime | as_local if raw_slot_start else none %}
          {{ slot_start.strftime('%H:%M:00')
             if not normal_off_peak_active and is_state(dispatch_entity, 'on') and slot_start is not none
             else '23:25:00' }}
        end_time: >-
          {% set dispatch_entity = 'binary_sensor.octopus_energy_00000000_0002_4000_8020_00000005cc63_intelligent_dispatching' %}
          {% set current_time = now().strftime('%H:%M:%S') %}
          {% set configured_start = states('input_datetime.off_peak_start_time') %}
          {% set configured_end = states('input_datetime.off_peak_end_time') %}
          {% set off_peak_start = configured_start if configured_start not in ['unknown', 'unavailable'] else '23:30:00' %}
          {% set off_peak_end = configured_end if configured_end not in ['unknown', 'unavailable'] else '05:30:00' %}
          {% set normal_off_peak_active = current_time >= off_peak_start or current_time < off_peak_end %}
          {% set raw_slot_end = state_attr(dispatch_entity, 'current_end') %}
          {% set slot_end = raw_slot_end | as_datetime | as_local if raw_slot_end else none %}
          {{ slot_end.strftime('%H:%M:00')
             if not normal_off_peak_active and is_state(dispatch_entity, 'on') and slot_end is not none
             else '23:26:00' }}

## Automations
automation:
  - id: autidoctopusintelligentgopeakslot
    alias: Octopus Intelligent Go peak period slot management
    description: "Charges the house battery if an Octopus Intelligent Go slot occurs in peak time"
    mode: restart
    trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - binary_sensor.octopus_intelligent_go_peak_time_slot
        to: "on"
      - platform: state
        entity_id:
          - binary_sensor.octopus_intelligent_go_peak_time_slot
        to: "off"
      - platform: state
        entity_id:
          - binary_sensor.octopus_intelligent_go_peak_time_slot
        attribute: start_time
      - platform: state
        entity_id:
          - binary_sensor.octopus_intelligent_go_peak_time_slot
        attribute: end_time
    condition:
      - condition: state
        entity_id: binary_sensor.octopus_power_up_active
        state: "off"
      - condition: state
        entity_id: binary_sensor.octopus_energy_a_acddc775_octoplus_saving_sessions
        state: "off"
    variables:
      operating_mode: "{{ states('input_select.energy_automation_mode') }}"
      slot_active: "{{ is_state('binary_sensor.octopus_intelligent_go_peak_time_slot', 'on') }}"
      slot_start: >-
        {% set dispatch_entity = 'binary_sensor.octopus_energy_00000000_0002_4000_8020_00000005cc63_intelligent_dispatching' %}
        {% set raw_start = state_attr(dispatch_entity, 'current_start') %}
        {% set start = raw_start | as_datetime | as_local if raw_start else none %}
        {{ start.strftime('%H:%M:00')
           if is_state('binary_sensor.octopus_intelligent_go_peak_time_slot', 'on') and start is not none
           else '23:25:00' }}
      slot_end: >-
        {% set dispatch_entity = 'binary_sensor.octopus_energy_00000000_0002_4000_8020_00000005cc63_intelligent_dispatching' %}
        {% set raw_end = state_attr(dispatch_entity, 'current_end') %}
        {% set end = raw_end | as_datetime | as_local if raw_end else none %}
        {{ end.strftime('%H:%M:00')
           if is_state('binary_sensor.octopus_intelligent_go_peak_time_slot', 'on') and end is not none
           else '23:26:00' }}
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ operating_mode == 'Automatic' }}"
            sequence:
              - service: foxess_modbus.update_charge_period
                data:
                  inverter: bb431a8f0b4902c51fdb98acdc4a6c6a
                  enable_force_charge: true
                  enable_charge_from_grid: >-
                    {{ true if is_state('binary_sensor.octopus_intelligent_go_peak_time_slot', 'on') else false }}
                  start: "{{ slot_start }}"
                  end: "{{ slot_end }}"
                  charge_period: "1"
              - service: system_log.write
                data:
                  level: info
                  logger: octopus_intelligent_go
                  message: >-
                    Applied daytime Intelligent Go charge window: active={{ slot_active }}, {{ slot_start }} to {{ slot_end }}.
          - conditions:
              - condition: template
                value_template: "{{ operating_mode == 'Observe only' }}"
            sequence:
              - service: system_log.write
                data:
                  level: info
                  logger: octopus_intelligent_go
                  message: >-
                    Would apply daytime Intelligent Go charge window: active={{ slot_active }}, {{ slot_start }} to {{ slot_end }}.
