dummy:
  description: Does nothing
  sequence: []
'1764594250263':
  alias: Attic Study Light Cycle
  mode: single
  sequence:
  - variables:
      current: "{% set s = states('input_select.attic_study_lights_mode') %} {% if
        s in ['full', 'streaming', 'off'] %}\n  {{ s }}\n{% else %}\n  off\n{% endif
        %}\n"
      next: "{% if current == 'full' %}\n  streaming\n{% elif current == 'streaming'
        %}\n  off\n{% else %}\n  full\n{% endif %}\n"
  - choose:
    - conditions: '{{ next == ''full'' }}'
      sequence:
      - target:
          entity_id: scene.attic_study_full
        action: scene.turn_on
    - conditions: '{{ next == ''streaming'' }}'
      sequence:
      - target:
          entity_id: scene.attic_study_streaming
        action: scene.turn_on
    - conditions: '{{ next == ''off'' }}'
      sequence:
      - target:
          entity_id: scene.attic_study_off
        action: scene.turn_on
    default: []
  - target:
      entity_id: input_select.attic_study_lights_mode
    data:
      option: '{{ next }}'
    action: input_select.select_option
turntable_restart:
