theme: okabe_ito
title: Main
type: custom:grid-layout
icon: mdi:home
badges: []

# Designed around the Kindle's wide landscape viewport.  The calendar is wide
# enough to read and scroll within its own card; no empty clock column.
layout:
  grid-template-columns: repeat(4, minmax(0, 1fr))
  # The camera defines this row's height from its native landscape frame.
  # Let following content move down rather than forcing a cropped image.
  grid-template-rows: 64px auto 220px 140px
  grid-template-areas: |
    "nav nav nav nav"
    "weather weather camera camera"
    "rory rory calendar calendar"
    "household household calendar calendar"
  grid-gap: 12px
  padding: 12px
  mediaquery:
    "(max-width: 800px)":
      grid-template-columns: minmax(0, 1fr)
      grid-template-rows: auto auto auto auto auto
      grid-template-areas: |
        "weather_mobile"
        "camera"
        "rory"
        "calendar"
        "household"
    "(max-aspect-ratio: 159/100) and (min-width: 801px)":
      grid-template-columns: repeat(2, minmax(0, 1fr))
      grid-template-rows: auto auto auto auto
      grid-template-areas: |
        "weather weather"
        "camera camera"
        "rory household"
        "calendar calendar"

cards:
  - type: grid
    columns: 5
    square: false
    view_layout:
      grid-area: nav
      show:
        mediaquery: "(min-width: 801px) and (min-aspect-ratio: 8/5)"
    cards:
      - type: custom:button-card
        template: kiosk_navigation
        variables: { destination: /lovelace-panel }
        name: Home
        icon: mdi:home-variant
        tap_action:
          action: navigate
          navigation_path: "/lovelace-panel/?wp_enabled=true"
      - type: custom:button-card
        template: kiosk_navigation
        variables: { destination: /lovelace-panel/1 }
        name: Power
        icon: mdi:transmission-tower-import
        tap_action:
          action: navigate
          navigation_path: "/lovelace-panel/1?wp_enabled=true"
      - type: custom:button-card
        template: kiosk_navigation
        variables: { destination: /lovelace-panel/2 }
        name: Battery
        icon: mdi:battery
        tap_action:
          action: navigate
          navigation_path: "/lovelace-panel/2?wp_enabled=true"
      - type: custom:button-card
        template: kiosk_navigation
        variables: { destination: /lovelace-panel/3 }
        name: Heating
        icon: mdi:radiator
        tap_action:
          action: navigate
          navigation_path: "/lovelace-panel/3?wp_enabled=true"
      - type: custom:button-card
        template: kiosk_clock

  - type: grid
    columns: 2
    square: false
    view_layout:
      grid-area: weather
      show:
        mediaquery: "(min-width: 801px)"
    cards:
      - type: weather-forecast
        entity: weather.forecast_home
        name: Seven-day outlook
        show_forecast: true
        forecast_type: daily
        secondary_info_attribute: humidity
      - type: custom:hourly-weather
        entity: weather.forecast_home
        name: Next 12 hours
        num_segments: 12
        icons: true
        label_spacing: 3
        show_precipitation_probability: true
        show_wind: false

  - type: vertical-stack
    view_layout:
      grid-area: weather_mobile
      show:
        mediaquery: "(max-width: 800px)"
    cards:
      - type: weather-forecast
        entity: weather.forecast_home
        name: Seven-day outlook
        show_forecast: true
        forecast_type: daily
        secondary_info_attribute: humidity
      - type: custom:hourly-weather
        entity: weather.forecast_home
        name: Next 12 hours
        num_segments: 12
        icons: true
        label_spacing: 3
        show_precipitation_probability: true
        show_wind: false

  - type: picture-entity
    entity: camera.front_door_fluent
    # This doorbell exposes a 10fps substream; request it explicitly rather
    # than relying on the slower still-image refresh used by camera_view:auto.
    camera_view: live
    show_state: false
    show_name: false
    # The Reolink substream is 16:9. A percentage keeps the core card's image
    # frame proportional at every width, including the single-column mobile
    # layout, so it shows the whole frame instead of object-fit cropping it.
    aspect_ratio: 56.25%
    view_layout:
      grid-area: camera
    style: |
      ha-card {
        width: 100%;
        height: auto !important;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        align-self: start;
      }

  - type: custom:stack-in-card
    view_layout:
      grid-area: rory
    cards:
      - type: markdown
        content: >-
          ## Rory

          **{{ states('sensor.next_school_days').split('|')[0] }}** — {{ states('sensor.rory_lessons_first_day') }}

          **{{ states('sensor.next_school_days').split('|')[1] }}** — {{ states('sensor.rory_lessons_second_day') }}
        style: |
          ha-card { border: none; padding-bottom: 0; }
      - type: custom:atomic-calendar-revive
        entities:
          - entity: calendar.rory_schedule
            name: Rory deadlines
            allowlist: 'Homework|Test|Deadline'
        maxDaysToShow: 90
        showLoader: false
        showLocation: false
        showWeekDay: true
        showProgressBar: false
        showHours: false
        hideFinishedEvents: true
        fullDayEventText: ""
        style: |
          ha-card { border: none; height: 110px !important; overflow-y: auto !important; }

  - type: custom:stack-in-card
    view_layout:
      grid-area: calendar
    style: |
      ha-card { height: 372px !important; overflow: hidden; }
    cards:
      - type: markdown
        content: "## Gareth and Nessa"
        style: |
          ha-card { border: none; height: 38px !important; padding: 8px 12px; }
      - type: custom:atomic-calendar-revive
        entities:
          - entity: calendar.gareth_and_nessa_shared
        maxDaysToShow: 365
        showLoader: false
        showLocation: false
        showWeekDay: true
        showProgressBar: false
        showHours: false
        hideFinishedEvents: true
        fullDayEventText: ""
        style: |
          ha-card {
            border: none;
            height: 334px !important;
            overflow-x: hidden !important;
            overflow-y: auto !important;
          }

  - type: horizontal-stack
    view_layout:
      grid-area: household
    cards:
      - type: glance
        columns: 5
        show_name: false
        entities:
          - entity: person.rory_marlow
            name: RM
          - entity: person.daniel_marlow
            name: DM
          - entity: person.nessa_marlow
            name: NM
          - entity: person.gareth_marlow
            name: GM
          - entity: device_tracker.blue_shell_location_tracker
            name: Car
            image: /local/blue_shell.jpg
          - entity: sensor.rorys_iphone_battery_level
          - entity: sensor.sulky_s_phone_battery_level
          - entity: sensor.vanessas_iphone_battery_level
          - entity: sensor.gareths_iphone_battery_level
          - entity: sensor.blue_shell_battery
      - type: custom:stack-in-card
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: sensor.next_bin_collection
                show_name: false
                show_icon: true
                show_state: false
                icon: |
                  [[[
                    const collection = entity.state.split("|")[1];
                    if (collection === "Organic") return "mdi:leaf";
                    if (collection === "Recycle") return "mdi:recycle";
                    return "mdi:trash-can-outline";
                  ]]]
                state:
                  - color: '#009E73'
                    operator: template
                    value: '[[[ return entity.state.split("|")[1] === "Organic" ]]]'
                  - color: '#0072B2'
                    operator: template
                    value: '[[[ return entity.state.split("|")[1] === "Recycle" ]]]'
              - type: conditional
                conditions:
                  - entity: binary_sensor.next_bin_collection_double
                    state: "on"
                card:
                  type: custom:button-card
                  entity: sensor.next_bin_collection
                  show_name: false
                  show_icon: true
                  show_state: false
                  icon: |
                    [[[
                      const collection = entity.state.split("|")[2];
                      if (collection === "Organic") return "mdi:leaf";
                      if (collection === "Recycle") return "mdi:recycle";
                      return "mdi:trash-can-outline";
                    ]]]
                  state:
                    - color: '#009E73'
                      operator: template
                      value: '[[[ return entity.state.split("|")[2] === "Organic" ]]]'
                    - color: '#0072B2'
                      operator: template
                      value: '[[[ return entity.state.split("|")[2] === "Recycle" ]]]'
          - type: markdown
            content: "**Bins:** {{ states('sensor.next_bin_collection').split('|')[0] }}"
            style: |
              ha-card { border: none; text-align: center; padding: 0 12px 8px; }
