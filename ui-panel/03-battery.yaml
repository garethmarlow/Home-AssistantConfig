theme: okabe_ito
title: Battery
type: custom:grid-layout

layout:
  grid-template-columns: repeat(4, minmax(0, 1fr))
  grid-template-rows: 64px 220px minmax(380px, auto) minmax(380px, auto)
  grid-template-areas: |
    "nav nav nav nav"
    "hero hero hero hero"
    "appliances appliances trend trend"
    "appliances appliances trend trend"
  grid-gap: 12px
  padding: 12px
  mediaquery:
    "(max-width: 800px)":
      grid-template-columns: minmax(0, 1fr)
      grid-template-rows: auto auto auto
      grid-template-areas: |
        "hero_mobile"
        "appliances_mobile"
        "trend"
    "(max-aspect-ratio: 159/100) and (min-width: 801px)":
      grid-template-columns: repeat(4, minmax(0, 1fr))
      grid-template-rows: 220px minmax(380px, auto) minmax(380px, auto)
      grid-template-areas: |
        "hero hero hero hero"
        "appliances appliances trend trend"
        "appliances appliances trend trend"
icon: mdi:battery
badges: []
cards:
  - type: grid
    columns: 5
    square: false
    view_layout:
      grid-area: nav
      show:
        mediaquery: "(min-width: 801px) and (min-aspect-ratio: 8/5)"
    cards:
      - type: custom:button-card
        template: kiosk_navigation
        variables: { destination: /lovelace-panel }
        name: Home
        icon: mdi:home-variant
        tap_action:
          action: navigate
          navigation_path: "/lovelace-panel/?wp_enabled=true"
      - type: custom:button-card
        template: kiosk_navigation
        variables: { destination: /lovelace-panel/1 }
        name: Power
        icon: mdi:transmission-tower-import
        tap_action:
          action: navigate
          navigation_path: "/lovelace-panel/1?wp_enabled=true"
      - type: custom:button-card
        template: kiosk_navigation
        variables: { destination: /lovelace-panel/2 }
        name: Battery
        icon: mdi:battery
        tap_action:
          action: navigate
          navigation_path: "/lovelace-panel/2?wp_enabled=true"
      - type: custom:button-card
        template: kiosk_navigation
        variables: { destination: /lovelace-panel/3 }
        name: Heating
        icon: mdi:radiator
        tap_action:
          action: navigate
          navigation_path: "/lovelace-panel/3?wp_enabled=true"
      - type: custom:button-card
        template: kiosk_clock

  - type: horizontal-stack
    view_layout:
      grid-area: hero
      show:
        mediaquery: "(min-width: 801px)"

    cards:
      - type: custom:button-card
        style: |
          ha-card {
          height: 200px !important;
          }
        entity: binary_sensor.battery_non_viability
        name: Battery Status
        show_name: true
        styles:
          grid:
            - grid-template-areas: '"n" "i" "l" "s"'
            - grid-template-rows: min-content 1fr min-content min-content
            - grid-template-columns: 1fr
          name:
            - align-self: middle
            - justify-self: start
            - font-size: 24px
            - padding-bottom: 4px
            - padding-top: 12px
            - padding-left: 22px
      - type: custom:bar-card
        entity: binary_sensor.battery_non_viability
        attribute: current_net_load_capacity_coverage
        name: Current Load Capacity
        positions:
          value: off
          icon: off
          name: off
        min: 0
        max: 3
        decimal: 1
        title: Current Capacity
        direction: up
        severity:
          - color: '#D55E00'
            from: 0
            to: 1
          - color: '#E69F00'
            from: 1
            to: 2
          - color: '#009E73'
            from: 2
            to: 4


      - type: custom:bar-card
        entity: binary_sensor.battery_non_viability
        attribute: base_load_capacity_coverage
        name: Base Load Capacity
        bar_style:
          padding-left: 2px
          text-align: left
        positions:
          value: off
          icon: off
          name: off
        min: 0
        max: 3
        decimal: 1
        title: Base Capacity
        direction: up
        severity:
          - color: '#D55E00'
            from: 0
            to: 1
          - color: '#E69F00'
            from: 1
            to: 2
          - color: '#009E73'
            from: 2
            to: 4


      - type: markdown
        title: Debug
        content: >-
          Available capacity: {{ states.binary_sensor.battery_non_viability.attributes.surplus_capacity | round(1) }} kWh


          Current capacity coverage: {{ (states.binary_sensor.battery_non_viability.attributes.current_net_load_capacity_coverage * 100) | round(0) }}%


          Base capacity coverage: {{ (states.binary_sensor.battery_non_viability.attributes.base_load_capacity_coverage * 100) | round(0) }}%

  # Phone is deliberately a different information hierarchy: clear status first,
  # rather than attempting to compress the four Kindle hero panels into a row.
  - type: grid
    columns: 2
    square: false
    view_layout:
      grid-area: hero_mobile
      show:
        mediaquery: "(max-width: 800px)"
    cards:
      - type: tile
        entity: sensor.battery_soc
        name: Battery
        icon: mdi:battery
        vertical: true
      - type: tile
        entity: sensor.bms_kwh_remaining
        name: Available energy
        icon: mdi:battery-medium
        vertical: true
      - type: tile
        entity: binary_sensor.battery_non_viability
        name: Off-peak reserve
        icon: mdi:battery-clock-outline
        vertical: true
      - type: tile
        entity: input_select.energy_automation_mode
        name: Automation
        icon: mdi:robot-outline
        vertical: true

  - type: grid
    columns: 2
    square: false
    view_layout:
      grid-area: appliances_mobile
      show:
        mediaquery: "(max-width: 800px)"
    cards:
      - type: tile
        entity: input_select.washing_machine_state_machine
        name: Washer
        icon: mdi:washing-machine
        vertical: true
      - type: tile
        entity: input_select.tumble_dryer_state_machine
        name: Tumble dryer
        icon: mdi:tumble-dryer
        vertical: true
      - type: tile
        entity: input_select.cooker_state_machine
        name: Cooker
        icon: mdi:stove
        vertical: true
      - type: tile
        entity: input_select.air_fryer_state_machine
        name: Air fryer
        icon: mdi:air-fryer
        vertical: true
      - type: tile
        entity: input_select.dishwasher_state_machine
        name: Dishwasher
        icon: mdi:dishwasher
        vertical: true

  - type: vertical-stack
    view_layout:
      grid-area: appliances
      show:
        mediaquery: "(min-width: 801px)"
    cards:
      - type: horizontal-stack
        view_layout:
          grid-column: 1 / 3
          grid-row: 2 / 2

        cards:

          - type: custom:button-card
            entity: input_select.washing_machine_state_machine
            aspect_ratio: 1/1
            show_state: false
            name: Washer
            styles:
              card:
                - padding: 10%
                - font-size: 10px
              img_cell:
                - justify-content: start
                - align-items: start
                - margin: none
              icon:
                - color: |
                    [[[
                      if (entity.state === 'job_ongoing') return '#0072B2';
                    ]]]
                - width: 70%
                - margin-top: '-10%'
              grid:
                - grid-template-areas: '"i remain" "n n" "cyc cyc" "en en" "time time"'
                - grid-template-columns: 1fr 1fr
                - grid-template-rows: 1fr min-content min-content min-content min-content
              name:
                - font-weight: bold
                - align-self: middle
                - justify-self: start
                - font-size: 13px
                - padding-bottom: 4px
              custom_fields:
                remain:
                  - align-self: start
                  - justify-self: end
                  - font-size: 14px
                cyc:
                  - align-self: middle
                  - justify-self: start
                  - padding-bottom: 2px
                en:
                  - align-self: middle
                  - justify-self: start
                  - padding-bottom: 2px
                time:
                  - align-self: middle
                  - justify-self: start
                  - padding-bottom: 2px
            custom_fields:
              remain: |
                [[[
                  return `<ha-icon
                      icon="mdi:sync"
                      style="width: 12px; height: 12px;">
                      </ha-icon>${states['sensor.washing_machine_cycles_available'].state}`
                ]]]
              cyc: |
                [[[
                  return `<ha-icon
                      icon="mdi:sync"
                      style="width: 12px; height: 12px;">
                      </ha-icon>Cycles: ${states['sensor.washing_machine_cycles_today'].state}`
                ]]]
              en: |
                [[[
                  return `<ha-icon
                      icon="mdi:home-lightning-bolt-outline"
                      style="width: 12px; height: 12px;">
                      </ha-icon>Energy: ${states['sensor.washing_machine_today_energy'].state} kWh`
                ]]]
              time: |
                [[[
                  return `<ha-icon
                      icon="mdi:clock-time-nine-outline"
                      style="width: 12px; height: 12px;">
                      </ha-icon>Run time: ${states['sensor.washing_machine_time_today'].state} h`
                ]]]


