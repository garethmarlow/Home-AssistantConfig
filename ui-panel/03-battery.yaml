      - type: horizontal-stack
        show_icon: false
        cards:
          - entity: sensor.load_power
            type: gauge
            name: Load
            unit: ' '
            max: 2
            severity:
              green: 0
              yellow: 0.6
              red: 1.25
          - entity: sensor.pv_power
            type: gauge
            name: Solar
            unit: ' '
            max: 2
            severity:
              green: 0
              yellow: 0
              red: 1
          - entity: sensor.house_net_load
            type: gauge
            name: Net Load
            unit: ' '
            max: 2
            severity:
              green: 0
              yellow: 0.6
              red: 1.25
          - type: custom:button-card
            color_type: blank-card

      - type: horizontal-stack
        show_icon: false
        view_layout:
          grid-column: 1 / 3
          grid-row: 3 / 3
        cards:
          - entity: sensor.octopus_energy_electricity_16p7133293_1012800425985_current_accumulative_cost
            name: Electricity Today
            type: entity
          - entity: sensor.octopus_energy_gas_g4p71420101600_3083012410_current_accumulative_cost
            name: Gas Today
            type: entity



  - type: custom:apexcharts-card
    view_layout:
      grid-area: trend
    apex_config:
      legend:
        show: false
      tooltip:
        enabled: true
      grid:
        show: false
      xaxis:
        axisTicks:
          show: false
        axisBorder:
          show: false
    header:
      show: true
      show_states: true
    graph_span: 12h
    series:
      - entity: sensor.house_net_load_30_minute_average
        stroke_width: 1
